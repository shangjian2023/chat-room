<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户注册 - 课程平台</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="background-wrapper">
        <div class="glass-panel">
            <h2 class="glass-title">用户注册</h2>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="glass-message {{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" action="/register">
                <div class="glass-form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" required placeholder="请输入用户名">
                </div>
                <div class="glass-form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" required placeholder="请输入密码">
                </div>
                <div class="glass-form-group">
                    <label for="confirm_password">确认密码</label>
                    <input type="password" id="confirm_password" name="confirm_password" required placeholder="请再次输入密码">
                </div>
                <button type="submit" class="glass-btn primary">注册</button>
            </form>
            <div class="glass-link">
                已有账号？<a href="/login">立即登录</a>
            </div>
        </div>
    </div>
</body>
</html>
